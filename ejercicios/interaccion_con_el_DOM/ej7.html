<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lista de Tareas</h1>
        <input id="input" />
        <button id="btn">Agregar</button>
        <ul id="lista"></ul>
    </div>
</body>
</html>
<script>

const input = document.getElementById('input');
const btn = document.getElementById('btn');
const lista = document.getElementById('lista');

btn.addEventListener('click', () => {
    const ul = document.createElement('ul');
    const h2 = document.createElement('h2');
    const li = document.createElement('li');
    const botonEstado = document.createElement('button');

    h2.textContent = input.value;
    botonEstado.textContent = "Tarea Pendiente ⏳";
    botonEstado.id = 'incompleta';

    li.appendChild(botonEstado);
    ul.appendChild(h2);
    ul.appendChild(li);
    lista.appendChild(ul);
    
    input.value = '';

    botonEstado.addEventListener('click', () => {
        if (botonEstado.id === "incompleta") {
            botonEstado.id = "proceso";
            botonEstado.textContent = "En Proceso ⚙️";
        } else if (botonEstado.id === "proceso") {
            botonEstado.id = "completada";
            botonEstado.textContent = "Tarea Finalizada ✔️";
        } else {
            botonEstado.id = "incompleta";
            botonEstado.textContent = "Tarea Pendiente ⏳";
        }
    });
});

</script>
